{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NLLRFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-2xl shadow-xl border border-gray-100">
        
        <div class="flex flex-col items-center space-y-2">
            <div class="p-3 bg-blue-600 rounded-xl text-white shadow-lg shadow-blue-200">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h2a1 1 0 00-1 1v2a1 1 0 001 1zM5 18h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Welcome back</h1>
            <p class="text-sm text-gray-500">Sign in to your dashboard to continue.</p>
        </div>

        {% if form.errors or error %}
        <div class="p-4 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600">
            Invalid email, username, or password. Please try again.
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Email or username</label>
                <input type="text" name="username" id="username" required autocomplete="username"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-gray-900 placeholder-gray-400 outline-none">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <a href="{% url 'password_reset' %}" class="text-sm font-semibold text-blue-600 hover:text-blue-700">Forgot?</a>
                </div>
                <input type="password" name="password" id="password" required autocomplete="current-password"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-gray-900 placeholder-gray-400 outline-none">
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember_me" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <label for="remember_me" class="ml-2 text-sm text-gray-500 selection:bg-transparent">Remember me on this device</label>
            </div>

            <button type="submit" 
                    class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl shadow-lg shadow-blue-200 transition-all transform active:scale-[0.98]">
                Sign in
            </button>
        </form>

        <div class="text-center pt-2 space-y-2">
            <p class="text-xs text-gray-400">Demo build — any password works. <a href="{% url 'homepg' %}" class="text-blue-600 hover:underline font-medium">Skip to dashboard</a></p>
            <p class="text-sm text-gray-500">Don't have an account? <a href="{% url 'register' %}" class="text-blue-600 hover:underline font-semibold">Sign up</a></p>
        </div>

    </div>

</body>
</html>
