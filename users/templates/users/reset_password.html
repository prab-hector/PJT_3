{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - NLLRFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.star{position:absolute;background-color:white;border-radius:50%;animation:pulse 3s infinite ease-in-out}@keyframes pulse{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}</style>
</head>
<body class="bg-black text-gray-100 flex items-center justify-center min-h-screen relative overflow-hidden">
    <div class="absolute inset-0 pointer-events-none">
        <div class="star w-1 h-1 top-12 left-1/4" style="animation-delay: 0.2s;"></div>
    </div>
    <div class="w-full max-w-md p-8 space-y-6 bg-zinc-900/80 rounded-2xl shadow-2xl border border-zinc-800 backdrop-blur-md relative z-10 mx-4">
        <div class="flex flex-col items-center space-y-3">
            <h1 class="text-2xl font-bold tracking-tight text-white pt-1">Reset password</h1>
            <p class="text-sm text-zinc-400">Enter your email to receive reset instructions.</p>
        </div>
        <form method="post" action="" class="space-y-4">{% csrf_token %}
            <div>
                <label for="email" class="block text-sm font-medium text-zinc-300 mb-1.5">Email</label>
                <input type="email" name="email" id="email" required class="w-full px-4 py-3 rounded-xl bg-zinc-950 border border-zinc-800 text-white placeholder-zinc-600 outline-none">
            </div>
            <button type="submit" class="w-full py-3.5 px-4 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl">Send reset email</button>
        </form>
        <div class="text-center pt-2 border-t border-zinc-800/60">
            <a href="{% url 'login' %}" class="text-sm text-blue-400 hover:underline">Back to login</a>
        </div>
    </div>
</body>
</html>
