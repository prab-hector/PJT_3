{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Password Reset Sent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
    <style>
        /* Ambient star background layer styles */
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: pulse 3.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.15; transform: scale(0.8); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }
        /* Slow cosmic drifting movement for the tracking satellite */
        @keyframes satelliteDrift {
            0% { transform: translate(-10%, 15vh) rotate(0deg); }
            50% { transform: translate(110vw, 45vh) rotate(180deg); }
            100% { transform: translate(-10%, 75vh) rotate(360deg); }
        }
        .orbiting-satellite {
            animation: satelliteDrift 45s infinite linear;
        }
    </style>
<body class="bg-black text-gray-100 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8 bg-zinc-900/80 rounded-2xl shadow-2xl border border-zinc-800">
        <h2 class="text-lg text-white">Password reset sent</h2>
        <p class="text-sm text-zinc-400">We've emailed you instructions for setting your password. Check your inbox.</p>
        <div class="text-center pt-2 border-t border-zinc-800/60">
            <a href="{% url 'login' %}" class="text-sm text-blue-400 hover:underline">Back to login</a>
        </div>
    </div>
</body>
</html>
