{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teammate Registration System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-zinc-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg p-8 bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl">
        <h2 class="text-xl font-bold text-white mb-1">Add New Teammate Profile</h2>
        <p class="text-xs text-zinc-500 mb-6">Master Card Enrollment Active Pipeline.</p>
        
        <div id="scanStatus" class="p-4 mb-4 bg-zinc-950 border-l-4 border-zinc-700 text-sm font-medium text-zinc-400 rounded-r-xl">
            Status: Waiting for Master Card initiation...
        </div>

        <form id="registrationForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase text-zinc-400 mb-1">Staged RFID Token UID</label>
                <input type="text" id="rfid_number" placeholder="Scan new token on hardware..." readonly required
                       class="w-full px-4 py-3 bg-zinc-950 border border-zinc-800 rounded-xl text-sm text-zinc-400 font-mono cursor-not-allowed">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-zinc-400 mb-1">Full Name</label>
                <input type="text" id="name" placeholder="Enter teammate name" required
                       class="w-full px-4 py-3 bg-zinc-950 border border-zinc-800 rounded-xl text-sm text-white focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-zinc-400 mb-1">Department / Branch</label>
                <input type="text" id="department" placeholder="e.g., Computer Engineering" required
                       class="w-full px-4 py-3 bg-zinc-950 border border-zinc-800 rounded-xl text-sm text-white focus:outline-none focus:border-blue-500">
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl transition-all">
                    Commit Profile to Database
                </button>
            </div>
        </form>
        <div id="message" class="p-3.5 mt-4 rounded-xl text-xs font-semibold hidden"></div>
    </div>

    <script>
        async function checkStagedCard() {
            try {
                let response = await fetch('/api/rfid/check-buffer/'); 
                if (response.ok) {
                    let data = await response.json();
                    const statusBox = document.getElementById('scanStatus');
                    const rfidInput = document.getElementById('rfid_number');
                    
                    if (data.card_staged && data.rfid_id) {
                        rfidInput.value = data.rfid_id;
                        statusBox.innerText = "Status: Card " + data.rfid_id + " Captured!";
                        statusBox.className = "p-4 bg-green-950/40 border-l-4 border-green-500 text-sm font-semibold text-green-400 rounded-r-xl";
                    } else if (data.master_scanned) {
                        statusBox.innerText = "Status: Master Card active. Tap target user token now...";
                        statusBox.className = "p-4 bg-yellow-950/40 border-l-4 border-yellow-500 text-sm font-semibold text-yellow-400 rounded-r-xl animate-pulse";
                    }
                }
            } catch (err) { console.error(err); }
        }

        setInterval(checkStagedCard, 2000);

        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msgDiv = document.getElementById('message');
            const payload = {
                rfid_id: document.getElementById('rfid_number').value,
                name: document.getElementById('name').value.trim(),
                department: document.getElementById('department').value,
                year: "First Year",
                phone: "0000000000",
                email: ""
            };

            try {
                let response = await fetch('/api/rfid/register-submit/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                let result = await response.json();
                if (response.ok) {
                    msgDiv.className = "p-3.5 rounded-xl text-xs font-semibold block bg-green-950 text-green-400";
                    msgDiv.innerText = "Success: Profile created.";
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                } else {
                    msgDiv.className = "p-3.5 rounded-xl text-xs font-semibold block bg-red-950 text-red-400";
                    msgDiv.innerText = "Error: " + result.message;
                }
            } catch (error) { console.error(error); }
        });
    </script>
</body>
</html>
