{% load static %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - NLLRFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-zinc-900/80 p-8 rounded-2xl border border-zinc-800 backdrop-blur-md shadow-2xl">
        
        <h2 class="text-2xl font-bold text-white mb-2">Update Profile Settings</h2>
        <p class="text-zinc-400 mb-6">Modify your account credentials and storage details below.</p>
        <hr class="border-zinc-800 mb-8">
        
        <form method="POST" class="space-y-8">
            {% csrf_token %}
            
            <div class="space-y-4">
                <h5 class="text-blue-400 font-semibold uppercase tracking-wider text-sm">Account Credentials</h5>
                <div class="text-zinc-300 [&>div>input]:bg-zinc-950 [&>div>input]:border-zinc-800 [&>div>input]:text-white [&>div>input]:rounded-xl [&>div>input]:px-4 [&>div>input]:py-3">
                    {{ u_form|crispy }}
                </div>
            </div>
            
            <div class="space-y-4">
                <h5 class="text-blue-400 font-semibold uppercase tracking-wider text-sm mt-4">Storage House Details</h5>
                <div class="text-zinc-300 [&>div>input]:bg-zinc-950 [&>div>input]:border-zinc-800 [&>div>input]:text-white [&>div>input]:rounded-xl [&>div>input]:px-4 [&>div>input]:py-3">
                    {{ s_form|crispy }}
                </div>
            </div>
            
            <div class="flex items-center justify-between pt-6 border-t border-zinc-800">
                <a href="{% url 'profile' %}" class="text-zinc-400 hover:text-white transition-colors">Cancel</a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold px-8 py-3 rounded-xl shadow-lg shadow-blue-950/50 transition-all active:scale-[0.98]">
                    Save Changes
                </button>
            </div>
        </form>
    </div>

</body>
</html>
