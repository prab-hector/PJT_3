<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    {% load crispy_forms_tags %}

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0 bg-white p-4">
                    <div class="card-body">
                        <h2 class="card-title text-dark font-weight-bold mb-4">Update Profile Settings</h2>
                        <hr class="mb-4">
                        
                        <form method="POST">
                            {% csrf_token %}
                            
                            <h5 class="text-info font-weight-bold mb-3">Account Credentials</h5>
                            {{ u_form|crispy }}
                            
                            <h5 class="text-info font-weight-bold mt-4 mb-3">Storage House Details</h5>
                            {{ s_form|crispy }}
                            
                            <div class="form-group mt-5 d-flex justify-content-between">
                                <a href="{% url 'profile' %}" class="btn btn-secondary px-4">Cancel</a>
                                <button class="btn btn-info px-5" type="submit">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
