<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetry Dashboard</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .cosmos-banner {
            width: 100%;
            max-height: 320px;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid #1f1f1f;
            margin-bottom: 24px;
        }
        .cosmos-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .controls-row {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
        }
        .search-filter-wrapper {
            flex: 1;
            position: relative;
        }
        .search-filter-wrapper input {
            width: 100%;
            background-color: #0f1115;
            border: 1px solid #1f242e;
            border-radius: 8px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }
        .date-picker-wrapper {
            width: 220px;
        }
        .date-picker-wrapper input {
            width: 100%;
            background-color: #0f1115;
            border: 1px solid #1f242e;
            border-radius: 8px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 14px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }
        .report-display-pane {
            width: 320px;
            background-color: #0f1115;
            border: 1px solid #1f242e;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 14px;
            color: #9ca3af;
            box-sizing: border-box;
        }
        .status-container {
            background-color: #090a0f;
            border: 1px solid #141722;
            border-radius: 12px;
            padding: 80px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .status-icon {
            margin-bottom: 16px;
            color: #3b82f6;
        }
        .status-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .status-subtitle {
            font-size: 14px;
            color: #6b7280;
            max-width: 440px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">

        <div class="cosmos-banner">
            <img src="/static/images/image_af1b4b.jpg" alt="Cosmos Stream Gateway Header">
        </div>

        <div class="controls-row">
            
            <div class="search-filter-wrapper">
                <input type="text" placeholder="Filter node search parameters..." autocomplete="off">
            </div>

            <div class="date-picker-wrapper">
                <input type="text" value="18-06-2026" readonly>
            </div>

            <div class="report-display-pane">
                Sheets Report
            </div>

        </div>

        <div class="status-container">
            <div class="status-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12a7 7 0 0 1 14 0M12 9v4M12 17h.01"/>
                    <path d="M9 15a3 3 0 0 1 6 0"/>
                </svg>
            </div>
            <div class="status-title">Awaiting Orbital Stream Transmissions</div>
            <div class="status-subtitle">System buffer listening for real-time validation data packages from local ESP32 gateway microcontrollers...</div>
        </div>

    </div>

</body>
</html>
