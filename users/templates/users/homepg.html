<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetry Dashboard</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* HEADER TOP NAVIGATION BAR SETUP */
        .navbar-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #090a0f;
            border: 1px solid #141722;
            padding: 12px 24px;
            border-radius: 10px;
            margin-bottom: 24px;
            gap: 20px;
        }
        .app-logo-block {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 18px;
            min-width: 200px;
        }
        .logo-icon {
            background-color: #2563eb;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* NEW CENTERED COSMOS BANNER FRAME */
        .navbar-cosmos-banner {
            flex: 1;
            height: 50px;
            overflow: hidden;
            border-radius: 6px;
            border: 1px solid #1f242e;
        }
        .navbar-cosmos-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .user-login-profile-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 180px;
            justify-content: flex-end;
        }
        .status-dot-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: #0c1917;
            border: 1px solid #10b981;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #10b981;
            text-transform: uppercase;
            font-weight: 600;
        }
        .avatar-circle {
            width: 36px;
            height: 36px;
            background-color: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        /* CONTROLS ROW INTERFACE CONFIGURATION */
        .controls-row {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
        }
        .search-filter-wrapper {
            flex: 1;
        }
        .search-filter-wrapper input {
            width: 100%;
            background-color: #0f1115;
            border: 1px solid #1f242e;
            border-radius: 8px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }
        .date-picker-wrapper {
            width: 220px;
        }
        .date-picker-wrapper input {
            width: 100%;
            background-color: #0f1115;
            border: 1px solid #1f242e;
            border-radius: 8px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 14px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }
        .report-display-pane {
            width: 320px;
            background-color: #0f1115;
            border: 1px solid #1f242e;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 14px;
            color: #ffffff;
            font-weight: 500;
            box-sizing: border-box;
        }

        /* DATA MONITOR FRAME BUFFER */
        .status-container {
            background-color: #090a0f;
            border: 1px solid #141722;
            border-radius: 12px;
            padding: 100px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .status-icon {
            margin-bottom: 16px;
            color: #3b82f6;
        }
        .status-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .status-subtitle {
            font-size: 14px;
            color: #6b7280;
            max-width: 440px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">

        <header class="navbar-header-row">
            
            <div class="app-logo-block">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                        <polyline points="2 17 12 22 22 17"/>
                        <polyline points="2 12 12 17 22 12"/>
                    </svg>
                </div>
                <span>Telemetry Dashboard</span>
            </div>

            <div class="navbar-cosmos-banner">
                <img src="/static/image_af1b4b.jpg" alt="Cosmos Space Banner" onerror="this.src='https://i.ibb.co/68v0wpy/space-placeholder.jpg';">
            </div>

            <div class="user-login-profile-badge">
                <div class="status-dot-indicator">
                    <span style="width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; display: inline-block; margin-right: 2px;"></span>
                    Gateway Online
                </div>
                <div class="avatar-circle">R</div>
            </div>

        </header>

        <div class="controls-row">
            
            <div class="search-filter-wrapper">
                <input type="text" placeholder="Filter node search parameters..." autocomplete="off">
            </div>

            <div class="date-picker-wrapper">
                <input type="text" value="18-06-2026" readonly>
            </div>

            <div class="report-display-pane">
                Sheets Report
            </div>

        </div>

        <main class="status-container">
            <div class="status-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12a7 7 0 0 1 14 0M12 9v4M12 17h.01"/>
                    <path d="M9 15a3 3 0 0 1 6 0"/>
                </svg>
            </div>
            <div class="status-title">Awaiting Orbital Stream Transmissions</div>
            <div class="status-subtitle">System buffer listening for real-time validation data packages from local ESP32 gateway microcontrollers...</div>
        </main>

    </div>

</body>
</html>
