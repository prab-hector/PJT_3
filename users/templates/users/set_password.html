{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password - NLLRFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .form-group input {
            background-color: #09090b !important;
            border: 1px solid #27272a !important;
            color: white !important;
            padding: 0.75rem 1rem !important;
            border-radius: 0.75rem !important;
            width: 100%;
        }
        label { color: #d4d4d8 !important; }
    </style>
</head>
<body class="bg-black text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-zinc-900/80 p-8 rounded-2xl border border-zinc-800 backdrop-blur-md shadow-2xl">
        <h2 class="text-2xl font-bold text-white mb-2">Set Account Password</h2>
        <p class="text-zinc-400 mb-6 text-sm">Please create a secure password for your account.</p>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="form-group text-zinc-300">
                {{ form|crispy }}
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl shadow-lg transition-all active:scale-[0.98]">
                Set Password
            </button>
        </form>
    </div>

</body>
</html>
